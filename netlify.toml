[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers (Lighthouse "Best Practices" / Trust & Safety).
# Applied at the edge because the app is a static export (next.config: output: 'export'),
# so Next.js headers() does not run.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://chat.postwyse.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; media-src 'self' https:; connect-src 'self' https://api.opswyse.com https://app.opswyse.com https://www.google-analytics.com https://*.google-analytics.com https://www.googletagmanager.com https://chat.postwyse.com wss://chat.postwyse.com; frame-src 'self' https:; worker-src 'self' blob:; form-action 'self' https://api.opswyse.com; upgrade-insecure-requests"
